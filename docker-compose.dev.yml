services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_USER: ${DB_USER:-ragbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragbot}
      POSTGRES_DB: ${DB_NAME:-ragbot}
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragbot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lgbot-dev

  api:
    build: .
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://${DB_USER:-ragbot}:${DB_PASSWORD:-ragbot}@postgres:5432/${DB_NAME:-ragbot}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - lgbot-dev

volumes:
  pgdata:

networks:
  lgbot-dev:
    driver: bridge
