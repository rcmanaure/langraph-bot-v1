services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_USER: ${DB_USER:-ragbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragbot}
      POSTGRES_DB: ${DB_NAME:-ragbot}
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragbot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lgbot-net

  api:
    build: .
    entrypoint: ["/app/entrypoint.sh"]
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - lgbot-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.lgbot.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.lgbot.entrypoints=websecure
      - traefik.http.routers.lgbot.tls=true
      - traefik.http.routers.lgbot.tls.certresolver=letsencrypt
      - traefik.http.routers.lgbot.service=lgbot
      - traefik.http.services.lgbot.loadbalancer.server.port=8000
      # Upload/admin router with longer timeout (indexing can take 60+s)
      - traefik.http.routers.lgbot_upload.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/upload`) || PathPrefix(`/admin/`))
      - traefik.http.routers.lgbot_upload.entrypoints=websecure
      - traefik.http.routers.lgbot_upload.tls=true
      - traefik.http.routers.lgbot_upload.tls.certresolver=letsencrypt
      - traefik.http.routers.lgbot_upload.service=lgbot_upload
      - traefik.http.services.lgbot_upload.loadbalancer.server.port=8000

volumes:
  pgdata:

networks:
  lgbot-net:
    external: true
